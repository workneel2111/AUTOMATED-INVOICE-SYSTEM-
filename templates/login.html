<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="max-w-md mx-auto mt-10 bg-white p-6 rounded shadow">

        <h1 class="text-2xl font-bold mb-4">Login</h1>

        <form method="POST">

            <input type="text" name="username" placeholder="Username" class="w-full border p-2 mb-3">

            <input type="password" name="password" placeholder="Password" class="w-full border p-2 mb-3">

            <button class="bg-green-600 text-white px-4 py-2 rounded w-full">
                Login
            </button>
            <p class="text-center mt-4 text-gray-600">
                Don't have an account?
                <a href="{{ url_for('register') }}" class="text-blue-600 font-semibold hover:underline">
                    Register here
                </a>
            </p>

        </form>

    </div>

</body>

</html>
